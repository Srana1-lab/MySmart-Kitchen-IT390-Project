<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Smart Kitchen - Recipe Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            color: white;
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 18px;
        }

        /* Main Card */
        .main-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 40px;
            animation: fadeInUp 0.8s ease-out;
        }

        /* Ingredient Input Section */
        .ingredient-section {
            margin-bottom: 40px;
        }

        .ingredient-section h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #667eea;
        }

        .ingredient-input-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .ingredient-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .ingredient-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .add-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .add-btn:active {
            transform: translateY(0);
        }

        /* Ingredient Tags */
        .ingredient-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .ingredient-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px;
            font-size: 14px;
            animation: scaleIn 0.3s ease-out;
        }

        .remove-btn {
            background: rgba(255, 255, 255, 0.3);
            border: none;
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .remove-btn:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(1.1);
        }

        /* Filter Section */
        .filter-section {
            margin-bottom: 30px;
        }

        .filter-section h3 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #333;
        }

        .filter-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .filter-chip {
            padding: 10px 20px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
        }

        .filter-chip:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .filter-chip.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        /* Generate Button */
        .generate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .generate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .generate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Recipe Grid */
        .recipe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            animation: fadeIn 0.8s ease-out;
        }

        .recipe-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            animation: scaleIn 0.5s ease-out;
        }

        .recipe-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .recipe-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .recipe-content {
            padding: 24px;
        }

        .recipe-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #333;
        }

        .recipe-description {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .recipe-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
            font-size: 14px;
            color: #888;
        }

        .recipe-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .recipe-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .recipe-tag {
            padding: 6px 12px;
            background: #f0f0f0;
            border-radius: 12px;
            font-size: 12px;
            color: #667eea;
            font-weight: 600;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            animation: fadeIn 0.8s ease-out;
        }

        .empty-state-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 28px;
            margin-bottom: 12px;
            color: white;
        }

        .empty-state p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 40px;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .feature-card:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
        }

        .feature-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .feature-title {
            font-size: 18px;
            font-weight: 600;
            color: white;
            margin-bottom: 8px;
        }

        .feature-description {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 32px;
            }

            .main-card {
                padding: 24px;
            }

            .ingredient-input-container {
                flex-direction: column;
            }

            .recipe-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🍳 My Smart Kitchen</h1>
            <p>Transform your ingredients into delicious recipes</p>
        </div>

        <!-- Main Input Card -->
        <div class="main-card">
            <!-- Ingredient Input -->
            <div class="ingredient-section">
                <h2>What ingredients do you have?</h2>
                <div class="ingredient-input-container">
                    <input 
                        type="text" 
                        id="ingredientInput" 
                        class="ingredient-input" 
                        placeholder="e.g., chicken, tomatoes, garlic..."
                    >
                    <button class="add-btn" onclick="addIngredient()">Add Ingredient</button>
                </div>
                <div id="ingredientTags" class="ingredient-tags"></div>
            </div>

            <!-- Cuisine Filter -->
            <div class="filter-section">
                <h3>Cuisine Preference</h3>
                <div class="filter-chips" id="cuisineFilters">
                    <div class="filter-chip" data-filter="italian">🇮🇹 Italian</div>
                    <div class="filter-chip" data-filter="mexican">🇲🇽 Mexican</div>
                    <div class="filter-chip" data-filter="chinese">🇨🇳 Chinese</div>
                    <div class="filter-chip" data-filter="indian">🇮🇳 Indian</div>
                    <div class="filter-chip" data-filter="american">🇺🇸 American</div>
                    <div class="filter-chip" data-filter="japanese">🇯🇵 Japanese</div>
                </div>
            </div>

            <!-- Dietary Filter -->
            <div class="filter-section">
                <h3>Dietary Preferences</h3>
                <div class="filter-chips" id="dietaryFilters">
                    <div class="filter-chip" data-filter="vegetarian">🥗 Vegetarian</div>
                    <div class="filter-chip" data-filter="vegan">🌱 Vegan</div>
                    <div class="filter-chip" data-filter="gluten-free">🌾 Gluten-Free</div>
                    <div class="filter-chip" data-filter="dairy-free">🥛 Dairy-Free</div>
                    <div class="filter-chip" data-filter="low-carb">🥑 Low-Carb</div>
                </div>
            </div>

            <!-- Generate Button -->
            <button class="generate-btn" onclick="generateRecipes()">
                ✨ Generate Recipes
            </button>
        </div>

        <!-- Recipe Results -->
        <div id="recipeResults"></div>
    </div>

    <script>
        // State
        let ingredients = [];
        let selectedCuisines = [];
        let selectedDietary = [];
        let recipes = [];

        // Mock recipe database
        const mockRecipes = [
            {
                id: 1,
                title: "Classic Margherita Pizza",
                description: "A timeless Italian classic with fresh tomatoes, mozzarella, and basil on a crispy crust.",
                image: "https://images.unsplash.com/photo-1574071318508-1cdbab80d002?w=800&q=80",
                cuisine: "italian",
                dietary: ["vegetarian"],
                cookTime: "25 min",
                difficulty: "Easy",
                ingredients: ["tomatoes", "mozzarella", "basil", "flour"]
            },
            {
                id: 2,
                title: "Chicken Tacos",
                description: "Delicious Mexican-style tacos with seasoned chicken, fresh vegetables, and zesty lime.",
                image: "https://images.unsplash.com/photo-1565299585323-38d6b0865b47?w=800&q=80",
                cuisine: "mexican",
                dietary: ["gluten-free"],
                cookTime: "30 min",
                difficulty: "Medium",
                ingredients: ["chicken", "tomatoes", "lettuce", "lime"]
            },
            {
                id: 3,
                title: "Vegetable Stir Fry",
                description: "A healthy and colorful Chinese stir-fry packed with fresh vegetables and savory sauce.",
                image: "https://images.unsplash.com/photo-1512058564366-18510be2db19?w=800&q=80",
                cuisine: "chinese",
                dietary: ["vegetarian", "vegan"],
                cookTime: "15 min",
                difficulty: "Easy",
                ingredients: ["broccoli", "carrots", "peppers", "soy sauce"]
            },
            {
                id: 4,
                title: "Butter Chicken",
                description: "Creamy and rich Indian curry with tender chicken in a tomato-based sauce.",
                image: "https://images.unsplash.com/photo-1603894584373-5ac82b2ae398?w=800&q=80",
                cuisine: "indian",
                dietary: ["gluten-free"],
                cookTime: "45 min",
                difficulty: "Medium",
                ingredients: ["chicken", "tomatoes", "cream", "spices"]
            },
            {
                id: 5,
                title: "Classic Cheeseburger",
                description: "Juicy beef patty with melted cheese, lettuce, tomato, and special sauce on a toasted bun.",
                image: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=800&q=80",
                cuisine: "american",
                dietary: [],
                cookTime: "20 min",
                difficulty: "Easy",
                ingredients: ["beef", "cheese", "lettuce", "tomatoes"]
            },
            {
                id: 6,
                title: "Salmon Sushi Roll",
                description: "Fresh salmon and avocado wrapped in perfectly seasoned rice and crisp nori.",
                image: "https://images.unsplash.com/photo-1579584425555-c3ce17fd4351?w=800&q=80",
                cuisine: "japanese",
                dietary: ["gluten-free", "dairy-free"],
                cookTime: "30 min",
                difficulty: "Hard",
                ingredients: ["salmon", "rice", "avocado", "nori"]
            },
            {
                id: 7,
                title: "Caprese Salad",
                description: "Simple and elegant Italian salad with tomatoes, fresh mozzarella, and basil.",
                image: "https://images.unsplash.com/photo-1592417817098-8fd3d9eb14a5?w=800&q=80",
                cuisine: "italian",
                dietary: ["vegetarian", "gluten-free"],
                cookTime: "10 min",
                difficulty: "Easy",
                ingredients: ["tomatoes", "mozzarella", "basil", "olive oil"]
            },
            {
                id: 8,
                title: "Veggie Burrito Bowl",
                description: "Healthy Mexican-inspired bowl with rice, beans, vegetables, and fresh toppings.",
                image: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=800&q=80",
                cuisine: "mexican",
                dietary: ["vegetarian", "vegan", "gluten-free"],
                cookTime: "25 min",
                difficulty: "Easy",
                ingredients: ["rice", "beans", "avocado", "tomatoes"]
            }
        ];

        // Add ingredient
        function addIngredient() {
            const input = document.getElementById('ingredientInput');
            const ingredient = input.value.trim().toLowerCase();
            
            if (ingredient && !ingredients.includes(ingredient)) {
                ingredients.push(ingredient);
                renderIngredients();
                input.value = '';
            }
        }

        // Remove ingredient
        function removeIngredient(ingredient) {
            ingredients = ingredients.filter(i => i !== ingredient);
            renderIngredients();
        }

        // Render ingredients
        function renderIngredients() {
            const container = document.getElementById('ingredientTags');
            container.innerHTML = ingredients.map(ingredient => `
                <div class="ingredient-tag">
                    ${ingredient}
                    <button class="remove-btn" onclick="removeIngredient('${ingredient}')">×</button>
                </div>
            `).join('');
        }

        // Handle enter key
        document.getElementById('ingredientInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addIngredient();
            }
        });

        // Setup filter chips
        function setupFilters() {
            // Cuisine filters
            document.querySelectorAll('#cuisineFilters .filter-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    const filter = chip.dataset.filter;
                    if (selectedCuisines.includes(filter)) {
                        selectedCuisines = selectedCuisines.filter(f => f !== filter);
                        chip.classList.remove('active');
                    } else {
                        selectedCuisines.push(filter);
                        chip.classList.add('active');
                    }
                });
            });

            // Dietary filters
            document.querySelectorAll('#dietaryFilters .filter-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    const filter = chip.dataset.filter;
                    if (selectedDietary.includes(filter)) {
                        selectedDietary = selectedDietary.filter(f => f !== filter);
                        chip.classList.remove('active');
                    } else {
                        selectedDietary.push(filter);
                        chip.classList.add('active');
                    }
                });
            });
        }

        // Generate recipes
        function generateRecipes() {
            // Filter recipes based on selections
            let filteredRecipes = mockRecipes;

            // Filter by cuisine
            if (selectedCuisines.length > 0) {
                filteredRecipes = filteredRecipes.filter(recipe => 
                    selectedCuisines.includes(recipe.cuisine)
                );
            }

            // Filter by dietary
            if (selectedDietary.length > 0) {
                filteredRecipes = filteredRecipes.filter(recipe =>
                    selectedDietary.every(diet => recipe.dietary.includes(diet))
                );
            }

            // Filter by ingredients (if any match)
            if (ingredients.length > 0) {
                filteredRecipes = filteredRecipes.filter(recipe =>
                    ingredients.some(ingredient => 
                        recipe.ingredients.some(recipeIng => 
                            recipeIng.includes(ingredient) || ingredient.includes(recipeIng)
                        )
                    )
                );
            }

            recipes = filteredRecipes;
            renderRecipes();
        }


        // Initialize
        setupFilters();
        renderRecipes();
    </script>
</body>
</html>
